name: Accessibility Full Site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  a11y-full:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start application
        run: npm run demo -- --port 3000 &

      - name: Wait for application
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000 && exit 0
            sleep 2
          done
          exit 1

      - name: Run full-site accessibility crawl
        run: node bin/cli.js check --dynamic --url http://localhost:3000 --crawl --crawl-depth 3 --crawl-limit 100 --semi-auto --out reports-full --fail-on none

      - name: Upload full-site accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-full-site-report
          path: reports-full/
