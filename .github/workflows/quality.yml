name: Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run fixture smoke tests
        run: npm run test:fixtures

      - name: Build demo
        run: npm run build:demo

      - name: Verify package contents
        run: npm pack --dry-run
