name: Adoption Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Collect adoption snapshot
        run: npm run collect:adoption:snapshot -- --period last-month --out analysis/adoption-snapshot.json

      - name: Upload adoption snapshot
        uses: actions/upload-artifact@v4
        with:
          name: adoption-snapshot
          path: analysis/adoption-snapshot.json
          retention-days: 90
