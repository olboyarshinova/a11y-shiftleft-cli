name: Accessibility rule mapping request
description: Request WCAG metadata or remediation guidance for a rule.
title: "[Rule mapping]: "
labels:
  - rule-mapping
body:
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: "color-contrast, page-has-heading-one, jsx-a11y/alt-text"
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - axe
        - eslint-plugin-jsx-a11y
        - eslint-plugin-vue
        - angular-eslint
        - Other
    validations:
      required: true
  - type: textarea
    id: current_output
    attributes:
      label: Current output
      description: Paste the relevant JSON or Markdown report excerpt.
      render: json
  - type: textarea
    id: expected_mapping
    attributes:
      label: Expected mapping or remediation
      description: Include WCAG criterion, level, or documentation link if known.
    validations:
      required: true
