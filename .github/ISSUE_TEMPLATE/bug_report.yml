name: Bug report
description: Report a reproducible problem with a11y-shiftleft-cli.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Run `npx a11y-shiftleft --version`.
      placeholder: "0.5.2"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node and npm versions
      description: Run `node --version && npm --version`.
      placeholder: "node v22.22.2, npm 10.9.7"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - React
        - Vue
        - Angular
        - Next.js
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command that failed.
      render: bash
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps someone else can follow.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Run `npx a11y-shiftleft doctor --url <your-url>` and paste the output.
      render: txt
  - type: textarea
    id: report_excerpt
    attributes:
      label: Report excerpt
      description: Paste a redacted excerpt from `reports/a11y-comment.md` or `reports/a11y-report.json` if relevant.
      render: txt
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
