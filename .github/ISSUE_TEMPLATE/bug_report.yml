name: Bug report
description: Report a reproducible problem with a11y-shiftleft-cli.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Run `npx a11y-shiftleft --version`.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - React
        - Vue
        - Angular
        - Next.js
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command that failed.
      render: bash
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Run `npx a11y-shiftleft doctor --no-fail` and paste the output.
      render: txt
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
